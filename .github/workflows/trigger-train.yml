# Reusable workflow — trigger a training run via rest_app and wait for completion.
#
# Caller example (in your application repo):
#
#   jobs:
#     train:
#       uses: Nilay-Mandloi/rest_app/.github/workflows/trigger-train.yml@main
#       with:
#         rest_app_url: https://your-rest-app-server
#         dataset_s3_uri: s3://bucket/path/dataset.parquet
#         params_s3_uri: s3://bucket/path/params.yaml
#         project: product_dq
#         model_name: sales_forecasting
#       secrets:
#         admin_token: ${{ secrets.REST_APP_ADMIN_TOKEN }}
#         aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
#         aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#         aws_default_region: ${{ secrets.AWS_DEFAULT_REGION }}
#
# Outputs:
#   trigger_id     — the trigger ID assigned to this run
#   versions_json  — JSON array: [{version_id, model_pkl_uri, channels, metrics}, ...]

name: trigger-train

on:
  workflow_call:
    inputs:
      rest_app_url:
        description: "rest_app base URL (e.g. https://your-server)"
        required: true
        type: string
      dataset_s3_uri:
        description: "S3 URI for the dataset file (s3://bucket/key.parquet or .csv)"
        required: true
        type: string
      params_s3_uri:
        description: "S3 URI for params.yaml (s3://bucket/key.yaml)"
        required: true
        type: string
      project:
        description: "Project name (must match ^[a-z0-9][a-z0-9_-]{0,62}$)"
        required: true
        type: string
      model_name:
        description: "Model name"
        required: true
        type: string
      category:
        description: "Model category (default: mlops)"
        default: "mlops"
        type: string
      model_family:
        description: "Model family: forecasting | regression | classification"
        default: "forecasting"
        type: string
      auto_promote:
        description: "Auto-promote champion on training success"
        default: false
        type: boolean
      poll_interval:
        description: "Seconds between /trigger-status polls"
        default: 20
        type: number
      poll_timeout:
        description: "Maximum seconds to wait for training before failing (default 3600 = 1h)"
        default: 3600
        type: number
    secrets:
      admin_token:
        required: true
        description: "Value of APP_ADMIN_TOKEN set on the rest_app server"
      aws_access_key_id:
        required: true
        description: "AWS access key for downloading dataset and params from S3"
      aws_secret_access_key:
        required: true
        description: "AWS secret key for downloading dataset and params from S3"
      aws_default_region:
        required: true
        description: "AWS region (e.g. ap-south-1)"
    outputs:
      trigger_id:
        description: "Trigger ID for this run"
        value: ${{ jobs.trigger.outputs.trigger_id }}
      versions_json:
        description: "JSON array of all published versions after training"
        value: ${{ jobs.trigger.outputs.versions_json }}

jobs:
  trigger:
    runs-on: ubuntu-latest
    outputs:
      trigger_id: ${{ steps.fire.outputs.trigger_id }}
      versions_json: ${{ steps.versions.outputs.versions_json }}

    steps:
      - uses: actions/checkout@v4

      # ── Step 1: download dataset + params from S3, then fire the trigger ────
      - name: Trigger training run
        id: fire
        env:
          ADMIN_TOKEN: ${{ secrets.admin_token }}
          AWS_ACCESS_KEY_ID: ${{ secrets.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret_access_key }}
          AWS_DEFAULT_REGION: ${{ secrets.aws_default_region }}
        run: |
          # Preserve the file extension so the server can infer the dataset format.
          DATASET_URI="${{ inputs.dataset_s3_uri }}"
          DATASET_EXT="${DATASET_URI##*.}"
          aws s3 cp "$DATASET_URI"               "/tmp/dataset.${DATASET_EXT}"
          aws s3 cp "${{ inputs.params_s3_uri }}" /tmp/params_file.yaml

          HTTP_CODE=$(curl -s \
            -o /tmp/trigger_response.json \
            -w "%{http_code}" \
            -X POST "${{ inputs.rest_app_url }}/trigger-train" \
            -H "X-Admin-Token: $ADMIN_TOKEN" \
            -F "category=${{ inputs.category }}" \
            -F "project=${{ inputs.project }}" \
            -F "model_name=${{ inputs.model_name }}" \
            -F "model_family=${{ inputs.model_family }}" \
            -F "auto_promote=${{ inputs.auto_promote }}" \
            -F "dataset=@/tmp/dataset.${DATASET_EXT}" \
            -F "params=@/tmp/params_file.yaml")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: /trigger-train returned HTTP $HTTP_CODE" >&2
            cat /tmp/trigger_response.json >&2
            exit 1
          fi

          RESPONSE=$(cat /tmp/trigger_response.json)
          echo "trigger_id=$(echo "$RESPONSE" | jq -r '.trigger_id')" >> "$GITHUB_OUTPUT"
          echo "Trigger ID: $(echo "$RESPONSE" | jq -r '.trigger_id')"
          echo "Status URL: ${{ inputs.rest_app_url }}$(echo "$RESPONSE" | jq -r '.status_url')"

      # ── Step 2: poll /trigger-status until completed or failed ───────────
      - name: Wait for training to complete
        env:
          TRIGGER_ID: ${{ steps.fire.outputs.trigger_id }}
        run: |
          URL="${{ inputs.rest_app_url }}/trigger-status/${TRIGGER_ID}?project=${{ inputs.project }}&category=${{ inputs.category }}"
          DEADLINE=$(( $(date +%s) + ${{ inputs.poll_timeout }} ))
          while true; do
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "ERROR: training did not complete within ${{ inputs.poll_timeout }}s" >&2
              exit 1
            fi
            sleep ${{ inputs.poll_interval }}
            STATUS=$(curl -sf "$URL" | jq -r '.status')
            echo "  [${STATUS}]"
            if [ "$STATUS" = "failed" ]; then
              REASON=$(curl -sf "$URL" | jq -r '.reason // "unknown"')
              echo "Training failed: $REASON" >&2
              exit 1
            fi
            [ "$STATUS" = "completed" ] && break
          done

      # ── Step 3: fetch all versions and expose as job output ──────────────
      - name: Fetch model versions
        id: versions
        run: |
          VERSIONS_JSON=$(curl -sf \
            "${{ inputs.rest_app_url }}/projects/${{ inputs.category }}/${{ inputs.project }}/models/${{ inputs.model_name }}/versions")
          echo "versions_json=$(echo "$VERSIONS_JSON" | jq -c '.versions')" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Published versions:"
          echo "$VERSIONS_JSON" | jq -r \
            '.versions[] | "  \(.version_id)  [\(.channels | join(", "))]  \(.model_pkl_uri)"'
