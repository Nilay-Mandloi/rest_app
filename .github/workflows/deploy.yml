name: Deploy

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Model version to bake in (e.g. v1, v7)'
        required: true
        type: string
      project:
        description: 'Project name in the artifact store'
        required: false
        default: 'project-mlflow'
        type: string
      model_name:
        description: 'Model name in the artifact store'
        required: false
        default: 'sales_forecasting'
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      ARTIFACT_STORE_BUCKET: ${{ secrets.ARTIFACT_STORE_BUCKET }}
      ARTIFACT_STORE_PREFIX: ${{ secrets.ARTIFACT_STORE_PREFIX }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate presigned URLs for model artifacts
        id: presign
        run: |
          PREFIX="${ARTIFACT_STORE_PREFIX%/}"
          BASE="${PREFIX:+${PREFIX}/}${{ inputs.project }}/${{ inputs.model_name }}/${{ inputs.model_version }}"

          MODEL_URL=$(aws s3 presign \
            "s3://${ARTIFACT_STORE_BUCKET}/${BASE}/model.pkl" \
            --expires-in 3600)
          MANIFEST_URL=$(aws s3 presign \
            "s3://${ARTIFACT_STORE_BUCKET}/${BASE}/manifest.json" \
            --expires-in 3600)

          # heredoc syntax keeps special URL characters safe in GITHUB_OUTPUT
          echo "model_url<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$MODEL_URL" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "manifest_url<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$MANIFEST_URL" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "Presigned URLs generated (expire in 1 hour)"

      - name: Build Docker image with baked model
        run: |
          docker build \
            --build-arg MODEL_URL="${{ steps.presign.outputs.model_url }}" \
            --build-arg MANIFEST_URL="${{ steps.presign.outputs.manifest_url }}" \
            -t "rest-app:${{ inputs.model_version }}" \
            -t "rest-app:latest" \
            .

      - name: Save image and upload to S3
        run: |
          VERSION="${{ inputs.model_version }}"
          TARBALL="rest-app-${VERSION}.tar.gz"
          docker save "rest-app:${VERSION}" | gzip > "${TARBALL}"
          aws s3 cp "${TARBALL}" \
            "s3://${ARTIFACT_STORE_BUCKET}/docker-images/${TARBALL}"
          echo "Saved: s3://${ARTIFACT_STORE_BUCKET}/docker-images/${TARBALL}"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION,ARTIFACT_STORE_BUCKET
          script: |
            set -e
            VERSION="${{ inputs.model_version }}"
            TARBALL="rest-app-${VERSION}.tar.gz"

            which aws 2>/dev/null || pip install --quiet awscli

            aws s3 cp \
              "s3://${ARTIFACT_STORE_BUCKET}/docker-images/${TARBALL}" \
              "/tmp/${TARBALL}"

            docker load < "/tmp/${TARBALL}"
            docker stop rest-app || true
            docker rm   rest-app || true
            docker run -d \
              --name rest-app \
              --restart unless-stopped \
              --env-file /home/rest_app/.env \
              -p 8000:8000 \
              "rest-app:${VERSION}"

            rm -f "/tmp/${TARBALL}"
            echo "deployed: $(docker inspect --format '{{.Id}}' rest-app | cut -c1-12)"
