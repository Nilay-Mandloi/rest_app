name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []          # set to [validate] if you want CI gate before deploy
    timeout-minutes: 15

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            git config --global --add safe.directory /home/rest_app
            cd /home/rest_app
            git pull origin main
            docker build -t rest-app:latest .
            docker stop rest-app || true
            docker rm   rest-app || true
            docker run -d \
              --name rest-app \
              --restart unless-stopped \
              --env-file /home/rest_app/.env \
              -p 8000:8000 \
              rest-app:latest
            echo "deployed: $(docker inspect --format '{{.Id}}' rest-app | cut -c1-12)"
